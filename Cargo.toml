[package]
name = "wsproxy"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "WebSocket proxy for TCP connections"
readme = "README.md"
homepage = "https://github.com/jprendes/wsproxy"
repository = "https://github.com/jprendes/wsproxy"

[dependencies]
clap = { version = "4", features = ["derive"] }
ctrlc = "3"
futures-util = "0.3"
rcgen = "0.13"
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }
rustls-pemfile = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sysinfo = "0.33"
tokio = { version = "1", features = ["full"] }
tokio-rustls = { version = "0.26", default-features = false, features = ["ring", "tls12"] }
tokio-tungstenite = { version = "0.29", default-features = false, features = ["connect", "handshake"] }
webpki-roots = "0.26"

[dev-dependencies]
tempfile = "3"

[[bin]]
name = "wsproxy"
path = "src/main.rs"
